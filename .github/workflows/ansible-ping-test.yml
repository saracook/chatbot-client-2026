name: ansible-ping-test
on:
  workflow_dispatch:
jobs:
  ansible-ping-test:
    runs-on: self-hosted
    steps:
      - name: checkout code
        uses: actions/checkout@v5
      - name: ping all hosts
        id: ping
        run: |
          set -e
          cd ansible
          install -m 0600 <(echo "$ANSIBLE_SSH_PRIVATE_KEY") /dev/shm/ansible.pem
          ssh-keygen -yf /dev/shm/ansible.pem > /dev/shm/ansible.pub
          export ANSIBLE_SSH_PRIVATE_KEY_FILE=/dev/shm/ansible.pem
          export ANSIBLE_SSH_PUBLIC_KEY_FILE=/dev/shm/ansible.pub
          ansible -a whoami -b -i c2-hosts -m shell all
          rm -f /dev/shm/ansible.*
        env:
          ANSIBLE_SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DEFAULT_PASSWORD: ${{ secrets.DEFAULT_PASSWORD }}
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          IDRAC_PASSWORD: ${{ secrets.IDRAC_PASSWORD }}
          IDRAC_USERNAME: ${{ secrets.IDRAC_USERNAME }}
          MUNGE_KEY_B64: ${{ secrets.MUNGE_KEY_B64 }}
          SLURM_DB_ROOT_PASSWORD: ${{ secrets.SLURM_DB_ROOT_PASSWORD }}
          SLURM_DB_SLURM_PASSWORD: ${{ secrets.SLURM_DB_SLURM_PASSWORD }}
        continue-on-error: true
      - name: post to slack if ping failed
        #if: ${{ steps.ping.conclusion == 'failure' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_API_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "GitHub Action result: ${{ job.status }}\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "GitHub Action result: ${{ job.status }}\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
