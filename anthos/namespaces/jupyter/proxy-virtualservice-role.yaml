apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: proxy-virtualservices-role
  annotations:
    configmanagement.gke.io/cluster-selector: jupyterhub-istio-proxy
rules:
- apiGroups:
  - networking.istio.io
  resources:
  - virtualservices
  verbs:
  - get
  - watch
  - list
  - create
  - delete
