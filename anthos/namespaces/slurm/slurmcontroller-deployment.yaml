apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    networkaccess: slurm
  name: slurmcontroller
  namespace: slurm
  annotations:
    configmanagement.gke.io/cluster-selector: slurm
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      service: slurmcontroller
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: 'runtime/default'            
      creationTimestamp: null
      labels:
        service: slurmcontroller
    spec:
      containers:
      - args:
        - slurmdbd
        command:
        - /usr/local/bin/docker-entrypoint.sh
        image: us-docker.pkg.dev/srcc-nero-prod/docker-repo/slurm-base-20.04:production
        imagePullPolicy: Always
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - echo test > /var/lib/slurmd/write-test
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: slurmdbd
        ports:
        - containerPort: 6819
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/slurm-llnl
          name: etc-slurm
        - mountPath: /var/lib/slurmd
          name: slurm-jobdir
        - mountPath: /var/log/slurm
          name: var-log-slurm
        - mountPath: /var/run/munge
          name: run-munge
        - mountPath: /var/lib/extrausers
          name: extra-users
          readOnly: true
      - args:
        - slurmctld
        command:
        - /usr/local/bin/docker-entrypoint.sh
        image: us-docker.pkg.dev/srcc-nero-prod/docker-repo/slurm-base-20.04:production
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - echo test > /var/lib/slurmd/write-test-slurmctld
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: slurmctld
        ports:
        - containerPort: 6817
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/slurm-llnl
          name: etc-slurm
        - mountPath: /var/lib/slurmd
          name: slurm-jobdir
        - mountPath: /var/log/slurm
          name: var-log-slurm
        - mountPath: /var/run/munge
          name: run-munge
        - mountPath: /var/lib/extrausers
          name: extra-users
          readOnly: true
      dnsConfig:
        options:
        - name: ndots
          value: "1"
        - name: single-request-reopen
      dnsPolicy: ClusterFirst
      hostname: slurmcontroller
      imagePullSecrets:
      - name: artifact-registry
      nodeSelector:
        srcc.stanford.edu/munged: "true"
        type: admin
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
      - name: artifact-registry
      volumes:
      - hostPath:
          path: /mnt/srcc/munge
          type: Directory
        name: run-munge
      - configMap:
          defaultMode: 365
          name: extrausers
        name: extra-users
      - configMap:
          defaultMode: 365
          name: slurm-conf
        name: etc-slurm
      - name: var-log-slurm
        persistentVolumeClaim:
          claimName: var-log-slurm
      - name: slurm-jobdir
        persistentVolumeClaim:
          claimName: slurm-jobdir
