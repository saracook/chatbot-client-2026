apiVersion: v1
kind: ConfigMap
metadata:
  name: boto-cfg
  namespace: slurm
  annotations:
    configmanagement.gke.io/cluster-selector: slurm
data:
  boto.sh: |
    export BOTO_PATH="/etc/gcloud/gsutil/boto.cfg:$HOME/.boto"
  boto.cfg: |
    [GSUtil]
      parallel_process_count = 4
      parallel_thread_count = 4 
