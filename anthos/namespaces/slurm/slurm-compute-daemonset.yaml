apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    configmanagement.gke.io/cluster-selector: slurm
  labels:
    name: slurm-compute
    networkaccess: slurm
    service: slurm
  name: slurm-compute
  namespace: slurm
spec:
  selector:
    matchLabels:
      name: slurm-compute
  template:
    metadata:
      labels:
        name: slurm-compute
        service: slurm
    spec:
      containers:
      - args:
        - /usr/local/bin/docker-entrypoint.sh
        - slurmd
        command:
        - /usr/bin/tini
        image: us-docker.pkg.dev/srcc-nero-prod/docker-repo/jupyter-20.04:production
        imagePullPolicy: IfNotPresent
        name: slurmd
        ports:
        - containerPort: 6818
          protocol: TCP
        resources:
          limits:
            cpu: "900m"
            memory: 350000Mi
          requests:
            cpu: "500m"
            memory: 200000Mi
        securityContext:
          privileged: true
          procMount: Default
          runAsGroup: 0
          runAsUser: 0
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /tmp
          name: temp
        - mountPath: /usr/share/lmod/lmod/modulefiles
          name: modulefiles
          readOnly: true
        - mountPath: /home
          name: home
        - mountPath: /share/pi
          name: share
          subPath: pi
        - mountPath: /share/data
          name: share
          subPath: data
        - mountPath: /share/sw
          name: sw-share
          subPath: share/sw  
          readOnly: true
        - mountPath: /sys/fs/cgroup
          name: cgroup
        - mountPath: /root/hostname
          name: localhost-name
          readOnly: true
        - mountPath: /var/run/munge
          name: run-munge
        - mountPath: /root/hosts
          name: host-mappings
          readOnly: true
        - mountPath: /etc/slurm-llnl
          name: etc-slurm
          readOnly: true
        - mountPath: /var/lib/extrausers
          name: extra-users
          readOnly: true
      dnsConfig:
        options:
        - name: ndots
          value: "1"
        - name: single-request-reopen
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: artifact-registry
      nodeSelector:
        type: slurm-compute
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        runAsUser: 0
      serviceAccount: default
      serviceAccountName: default
      terminationGracePeriodSeconds: 10
      tolerations:
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
      - effect: NoExecute
        key: stanford-compute-type
        operator: Equal
        value: compute
      volumes:
      - hostPath:
          path: /mnt/slurm-temp
          type: Directory
        name: temp
      - hostPath:
          path: /mnt/srcc/modulefiles
          type: Directory
        name: modulefiles
      - name: home
        persistentVolumeClaim:
          claimName: cephfs-static-home
      - name: share
        persistentVolumeClaim:
          claimName: cephfs-static-pi
      - name: sw-share
        nfs:
          server: 10.152.14.101
          path: /
      - hostPath:
          path: /sys/fs/cgroup
          type: Directory
        name: cgroup
      - configMap:
          defaultMode: 365
          name: slurm-node-conf
        name: etc-slurm
      - configMap:
          defaultMode: 420
          name: host-mappings
        name: host-mappings
      - hostPath:
          path: /etc/hostname
          type: File
        name: localhost-name
      - hostPath:
          path: /mnt/srcc/munge
          type: Directory
        name: run-munge
      - configMap:
          defaultMode: 365
          name: extrausers
        name: extra-users
  updateStrategy:
    type: OnDelete
