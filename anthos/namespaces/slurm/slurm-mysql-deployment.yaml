apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: slurm-mysql
  name: slurm-mysql
  namespace: slurm
  annotations:
    configmanagement.gke.io/cluster-selector: slurm
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      service: slurm-mysql
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: 'runtime/default'
      labels:
        service: slurm-mysql
    spec:
      containers:
      - env:
        - name: MYSQL_DATABASE
          value: slurm_acct_db
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-root-password
              key: password
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-password
              key: password
        - name: MYSQL_USER
          value: slurm
        image: mariadb:latest
        imagePullPolicy: IfNotPresent
        lifecycle:
          preStop:
            exec:
              command:
              - /usr/bin/mysqladmin
              - -uroot
              - -p$MYSQL_ROOT_PASSWORD
              - shutdown
        name: slurm-mysql
        ports:
        - containerPort: 3306
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/mysql
          name: var-lib-mysql
        - mountPath: /etc/mysql/conf.d
          name: slurm-mysql
      dnsConfig:
        options:
        - name: ndots
          value: "1"
        - name: single-request-reopen
      dnsPolicy: ClusterFirst
      hostname: slurm-mysql
      nodeSelector:
        type: admin
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: var-lib-mysql
        persistentVolumeClaim:
          claimName: slurm-lib-mysql
      - configMap:
          defaultMode: 420
          name: slurm-mysql
        name: slurm-mysql
