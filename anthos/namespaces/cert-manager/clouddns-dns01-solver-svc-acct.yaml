apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: clouddns-dns01-solver-svc-acct
  namespace: cert-manager
spec:
  refreshInterval: 1h           # rate SecretManager pulls GCPSM
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm-store               # name of the SecretStore (or kind specified)
  target:
    name: clouddns-dns01-solver-svc-acct  # name of the k8s Secret to be created
    creationPolicy: Owner
  data:
  - secretKey: key.json  # name of the GCPSM secret key
    remoteRef:
      key: clouddns-sa-solver-key
