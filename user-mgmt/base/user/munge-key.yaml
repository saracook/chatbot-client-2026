apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: munge-key
spec:
  refreshInterval: 1h           # rate SecretManager pulls GCPSM
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm-store             # name of the SecretStore (or kind specified)
  target:
    name: munge-key             # name of the k8s Secret to be created
    creationPolicy: Owner
    template:
      metadata:
        annotations:
          configmanagement.gke.io/cluster-selector: slurm
  data:
  - secretKey: munge.key        # name of the GCPSM secret key
    remoteRef:
      key: munge-key
