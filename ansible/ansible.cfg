[defaults]
ansible_managed = "This file is managed by Ansible. Changes to it may be overwritten."
host_key_checking = False
interpreter_python = auto_silent
inventory = hosts
nocows = 1
pipelining = True
remote_tmp = /var/tmp/$USER/ansible/tmp
retry_files_enabled = False
local_tmp = /var/tmp/$USER/ansible/tmp
verbosity = 0
