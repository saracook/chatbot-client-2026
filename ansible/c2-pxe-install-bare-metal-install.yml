- name: power off pxe clients
  ansible.builtin.shell:
    cmd: |
      sshpass \
      -p "$IDRAC_PASSWORD" \
      ssh \
      -l "$IDRAC_USERNAME" \
      {{ idrac_ip }} \
      racadm serveraction powerdown
  environment:
    IDRAC_PASSWORD: "{{ idrac_password }}"
    IDRAC_USERNAME: "{{ idrac_username }}"

- name: wait until pxe clients are powered off
  ansible.builtin.shell:
    cmd: |
      sshpass \
      -p "$IDRAC_PASSWORD" \
      ssh \
      -l "$IDRAC_USERNAME" \
      {{ idrac_ip }} \
      racadm getsysinfo -s | grep 'Power Status' | awk '{print $NF}'
  environment:
    IDRAC_PASSWORD: "{{ idrac_password }}"
    IDRAC_USERNAME: "{{ idrac_username }}"
  register: pwrstat
  until: pwrstat.stdout == 'OFF'
  # retry for 3 minutes
  retries: 18
  delay: 10

- name: set pxe clients to pxe boot
  ansible.builtin.shell:
    cmd: |
      cat <<EOF | sshpass -p "$IDRAC_PASSWORD" ssh -l "$IDRAC_USERNAME" {{ idrac_ip }}
      racadm set iDRAC.ServerBoot.BootOnce Enabled
      racadm set iDRAC.ServerBoot.FirstBootDevice PXE
      EOF
  environment:
    IDRAC_PASSWORD: "{{ idrac_password }}"
    IDRAC_USERNAME: "{{ idrac_username }}"

- name: power on pxe clients
  ansible.builtin.shell:
    cmd: |
      sshpass \
      -p "$IDRAC_PASSWORD" \
      ssh \
      -l "$IDRAC_USERNAME" \
      {{ idrac_ip }} \
      racadm serveraction powerup
  environment:
    IDRAC_PASSWORD: "{{ idrac_password }}"
    IDRAC_USERNAME: "{{ idrac_username }}"

- name: wait until pxe clients are powered on
  ansible.builtin.shell:
    cmd: |
      sshpass \
      -p "$IDRAC_PASSWORD" \
      ssh \
      -l "$IDRAC_USERNAME" \
      {{ idrac_ip }} \
      racadm getsysinfo -s | grep 'Power Status' | awk '{print $NF}'
  environment:
    IDRAC_PASSWORD: "{{ idrac_password }}"
    IDRAC_USERNAME: "{{ idrac_username }}"
  register: pwrstat
  until: pwrstat.stdout == 'ON'
  # retry for 3 minutes
  retries: 18
  delay: 10

- name: wait until pxe clients are powered off
  ansible.builtin.shell:
    cmd: |
      sshpass \
      -p "$IDRAC_PASSWORD" \
      ssh \
      -l "$IDRAC_USERNAME" \
      {{ idrac_ip }} \
      racadm getsysinfo -s | grep 'Power Status' | awk '{print $NF}'
  environment:
    IDRAC_PASSWORD: "{{ idrac_password }}"
    IDRAC_USERNAME: "{{ idrac_username }}"
  register: pwrstat
  until: pwrstat.stdout == 'OFF'
  # retry for 15 minutes
  retries: 30
  delay: 30
