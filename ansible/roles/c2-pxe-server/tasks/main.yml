- name: install packages
  ansible.builtin.dnf:
    name:
      - dnsmasq
      - grub2-efi-x64
      - nginx
      - shim-x64
      - syslinux
      - tftp
    state: present
    update_cache: yes

- name: install /etc/NetworkManager/NetworkManager.conf
  ansible.builtin.template:
    src: NetworkManager.conf.j2
    dest: /etc/NetworkManager/NetworkManager.conf
    owner: root
    group: root
    mode: '0644'
  register: nmconf

- name: restart NetworkManager
  ansible.builtin.systemd_service:
    name: NetworkManager.service
    state: restarted
    daemon_reload: yes
  when: nmconf is changed

