- name: restart slurmctld.service
  ansible.builtin.systemd_service:
    name: slurmctld.service
    state: restarted
    daemon_reload: yes

- name: restart slurmrestd.service
  ansible.builtin.systemd_service:
    name: slurmrestd.service
    state: restarted
    daemon_reload: yes

- name: run partition qos
  ansible.builtin.command: /admin/bin/slurm-partition-qos
