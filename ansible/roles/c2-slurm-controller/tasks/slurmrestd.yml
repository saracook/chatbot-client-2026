- name: create group {{ slurmrestd_group }}
  ansible.builtin.group:
    name: "{{ slurmrestd_group }}"
    gid: "{{ slurmrestd_gid }}"

- name: create user {{ slurmrestd_user }}
  ansible.builtin.user:
    name: "{{ slurmrestd_user }}"
    uid: "{{ slurmrestd_uid }}"
    group: "{{ slurmrestd_group }}"
    home: /nonexistent
    create_home: no
    shell: /usr/sbin/nologin

- name: install packages
  ansible.builtin.dnf:
    name:
      - slurm-slurmrestd-{{ slurm_version }}
    state: present
    update_cache: yes
    enablerepo: c2-local

#- name: install /etc/systemd/system/slurmrestd.service
#  ansible.builtin.copy:
