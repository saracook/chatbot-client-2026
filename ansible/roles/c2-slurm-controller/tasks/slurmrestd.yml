#    dest: /etc/systemd/system/slurmrestd.service
#    owner: root
#    group: root
#    mode: '00644'
#  register: srstdsrv

- name: install /etc/sysconfig/slurmrestd
  ansible.builtin.copy:
    src: etc/sysconfig/slurmrestd
    dest: /etc/sysconfig/slurmrestd
    owner: root
    group: root
    mode: '00644'
  register: srstdsc

- name: start/restart and enable slurmrestd.service
  ansible.builtin.systemd_service:
    name: slurmrestd.service
    #state: "{{ 'restarted' if srstdsrv.changed or srstdsc.changed else 'started' }}"
    state: "{{ 'restarted' if srstdsc.changed else 'started' }}"
    enabled: yes
    daemon_reload: yes
