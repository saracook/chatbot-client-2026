# modified from rocky*.repo files in package rocky-repos
- name: install /etc/yum.repos.d/rocky*.repo
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: /etc/yum.repos.d/{{ item }}
  loop:
    - rocky-addons.repo
    - rocky-devel.repo
    - rocky-extras.repo
    - rocky.repo

- name: install /etc/yum.repos.d/c2-local.repo
  ansible.builtin.copy:
    content: |
      [c2-local]
      name=Carina 2.0 local RPM repository
      baseurl=http://{{ rpm_repo_ip }}:{{ rpm_repo_port }}/rpm/{{ distros[distro]['name'] }}
      gpgcheck=0
      enabled=0
    dest: /etc/yum.repos.d/c2-local.repo
    owner: root
    group: root
    mode: '0644'

- name: install epel-release package
  ansible.builtin.dnf:
    name: epel-release
    state: present
    update_cache: yes

- name: disable epel repo
  community.general.dnf_config_manager:
    name: epel
    state: disabled

- name: disable epel-cisco-openh264 repo
  community.general.dnf_config_manager:
    name: epel-cisco-openh264
    state: disabled
  when: distros[distro]['version'] == '9.6'

# https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/cuda-rhel9.repo
- name: install /etc/yum.repos.d/cuda-rhel9.repo
  ansible.builtin.copy:
    content: |
      [cuda-rhel9-x86_64]
      name=cuda-rhel9-x86_64
      baseurl=https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64
      enabled=0
      gpgcheck=1
      gpgkey=https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/D42D0685.pub
    dest: /etc/yum.repos.d/cuda-rhel9.repo
    owner: root
    group: root
    mode: '0644'
  when: distros[distro]['version'] == '9.6'

# https://developer.download.nvidia.com/compute/cuda/repos/rhel10/x86_64/cuda-rhel10.repo
- name: install /etc/yum.repos.d/cuda-rhel10.repo
  ansible.builtin.copy:
    content: |
      [cuda-rhel10-x86_64]
      name=cuda-rhel10-x86_64
      baseurl=https://developer.download.nvidia.com/compute/cuda/repos/rhel10/x86_64
      enabled=0
      gpgcheck=1
      gpgkey=https://developer.download.nvidia.com/compute/cuda/repos/rhel10/x86_64/CDF6BA43.pub
    dest: /etc/yum.repos.d/cuda-rhel10.repo
    owner: root
    group: root
    mode: '0644'
  when: distros[distro]['version'] == '10.0'

# https://raw.githubusercontent.com/TurboVNC/repo/main/TurboVNC.repo
- name: install /etc/yum.repos.d/turbovnc.repo
  ansible.builtin.copy:
    content: |
      [turbovnc]
      name=TurboVNC official RPMs
      baseurl=https://packagecloud.io/dcommander/turbovnc/rpm_any/rpm_any/$basearch
      repo_gpgcheck=1
      gpgcheck=1
      gpgkey=https://packagecloud.io/dcommander/turbovnc/gpgkey
             https://raw.githubusercontent.com/TurboVNC/repo/main/VGL-GPG-KEY
             https://raw.githubusercontent.com/TurboVNC/repo/main/VGL-GPG-KEY-1024
      enabled=0
      # exclude beta releases
      excludepkgs=turbovnc-*.*.9[0-9]-*
      sslverify=1
      sslcacert=/etc/pki/tls/certs/ca-bundle.crt
    dest: /etc/yum.repos.d/turbovnc.repo
    owner: root
    group: root
    mode: '0644'
  when: inventory_hostname in groups['c2_compute_node']

- name: install base os packages
  ansible.builtin.dnf:
    name: "{{ base_os_packages }}"
    state: present
    update_cache: yes
