- ansible.builtin.include_tasks:
    file: repos.yml
    apply:
      tags:
        - repos
  tags:
    - always

- ansible.builtin.include_tasks:
    file: packages.yml
    apply:
      tags:
        - packages
  tags:
    - always

- ansible.builtin.include_tasks:
    file: services.yml
    apply:
      tags:
        - services
  tags:
    - always

- ansible.builtin.include_tasks:
    file: chrony.yml
    apply:
      tags:
        - chrony
  tags:
    - always

- name: run role c2-node-exporter
  ansible.builtin.include_role:
    name: c2-node-exporter
    apply:
      tags:
        - node-exporter
  tags:
    - always

- name: run role c2-kvm-guest
  ansible.builtin.include_role:
    name: c2-kvm-guest
    apply:
      tags:
        - kvm-guest
  tags:
    - always
  when: inventory_hostname in groups['c2_kvm_guest']

- block:
    - ansible.builtin.include_tasks:
        file: nfs-mounts.yml
        apply:
          tags:
            - nfs-mounts
      tags:
        - always
  when: inventory_hostname in groups['c2_nfs_client']

- block:
    - ansible.builtin.include_tasks:
        file: lmod.yml
        apply:
          tags:
            - lmod
      tags:
        - always
    - ansible.builtin.include_tasks:
        file: ood.yml
        apply:
          tags:
            - ood
      tags:
        - always
  when: inventory_hostname in ( groups['c2_compute_node'] + groups['c2_login_node'] + groups['c2_open_ondemand'] )

- name: run role c2-krb5-ldap-client
  ansible.builtin.include_role:
    name: c2-krb5-ldap-client
    apply:
      tags:
        - krb5-ldap-client
  tags:
    - always
  when: inventory_hostname in groups['c2_krb5_ldap_client']

- name: run role c2-splunk-client
  ansible.builtin.include_role:
    name: c2-splunk-client
    apply:
      tags:
        - splunk-client
  tags:
    - always
  when: inventory_hostname in groups['c2_splunk_client']
