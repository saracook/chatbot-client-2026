- ansible.builtin.include_tasks:
    file: passwords.yml
    apply:
      tags:
        - passwords
  tags:
    - always

- ansible.builtin.include_tasks:
    file: hostname.yml
    apply:
      tags:
        - hostname
  tags:
    - always

- ansible.builtin.include_tasks:
    file: repos.yml
    apply:
      tags:
        - repos
  tags:
    - always

- ansible.builtin.include_tasks:
    file: packages.yml
    apply:
      tags:
        - packages
  tags:
    - always

- ansible.builtin.include_tasks:
    file: services.yml
    apply:
      tags:
        - services
  tags:
    - always

- ansible.builtin.include_tasks:
    file: chrony.yml
    apply:
      tags:
        - chrony
  tags:
    - always

- ansible.builtin.include_tasks:
    file: root-ssh.yml
    apply:
      tags:
        - root-ssh
  tags:
    - always
  when: inventory_hostname in ( groups['c2_admin_node'] + groups['c2_kvm_host'] + groups['c2_login_node'] )

- name: run role c2-node-exporter
  ansible.builtin.include_role:
    name: c2-node-exporter
    apply:
      tags:
        - node-exporter
  tags:
    - always

- name: run role c2-kvm-guest
  ansible.builtin.include_role:
    name: c2-kvm-guest
    apply:
      tags:
        - kvm-guest
  tags:
    - always
  when: inventory_hostname in groups['c2_kvm_guest']

- block:
    - ansible.builtin.include_tasks:
        file: nfs-mounts.yml
        apply:
          tags:
            - nfs-mounts
      tags:
        - always
  when: inventory_hostname in groups['c2_nfs_client']

# todo: rethink this grouping
- block:
    - ansible.builtin.include_tasks:
        file: lmod.yml
        apply:
          tags:
            - lmod
      tags:
        - always
    - ansible.builtin.include_tasks:
        file: ood.yml
        apply:
          tags:
            - ood
      tags:
        - always
  when: inventory_hostname in ( groups['c2_admin_node'] + groups['c2_compute_node'] + groups['c2_login_node'] + groups['c2_open_ondemand'] )

- name: run role c2-krb5-ldap-client
  ansible.builtin.include_role:
    name: c2-krb5-ldap-client
    apply:
      tags:
        - krb5-ldap-client
  tags:
    - always
  when: inventory_hostname in groups['c2_krb5_ldap_client']

- block:
    - name: run role c2-splunk-client
      ansible.builtin.include_role:
        name: c2-splunk-client
        apply:
          tags:
            - splunk-client
      tags:
        - always
    - name: run role c2-crowdstrike
      ansible.builtin.include_role:
        name: c2-crowdstrike
        apply:
          tags:
            - crowdstrike
      tags:
        - always
    - name: run role c2-ossec
      ansible.builtin.include_role:
        name: c2-ossec
        apply:
          tags:
            - ossec
      tags:
        - always
  when: inventory_hostname in groups['c2_minsec_node']

- name: run role c2-slurm-client
  ansible.builtin.include_role:
    name: c2-slurm-client
    apply:
      tags:
        - slurm-client
  tags:
    - always
  when: inventory_hostname in groups['c2_slurm_client']
