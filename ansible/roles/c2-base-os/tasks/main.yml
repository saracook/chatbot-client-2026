- ansible.builtin.include_tasks:
    file: packages.yml
    apply:
      tags:
        - packages
  tags:
    - always

- ansible.builtin.include_tasks:
    file: services.yml
    apply:
      tags:
        - services
  tags:
    - always

- ansible.builtin.include_tasks:
    file: chrony.yml
    apply:
      tags:
        - chrony
  tags:
    - always

- name: run role c2-kvm-guest
  ansible.builtin.include_role:
    name: c2-kvm-guest
    apply:
      tags:
        - kvm-guest
  tags:
    - always
  when: inventory_hostname in groups['c2_kvm_guest']

- ansible.builtin.include_tasks:
    file: nfs_mounts.yml
    apply:
      tags:
        - nfs_mounts
  when: inventory_hostname in groups['c2_nfs_client']
  tags:
    - always

- name: run role c2-node-exporter
  ansible.builtin.include_role:
    name: c2-node-exporter
    apply:
      tags:
        - node-exporter
  tags:
    - always

- name: run role c2-krb5-ldap-client
  ansible.builtin.include_role:
    name: c2-krb5-ldap-client
    apply:
      tags:
        - krb5-ldap-client
  tags:
    - always
  when: inventory_hostname in groups['c2_krb5_ldap_client']
