- name: get code-server rpms for each distro
  ansible.builtin.get_url:
    url: "{{ code_server_rpms[_distro.value.el]['url'] }}"
    dest: /srv/rpm/{{ _distro.value.name }}/{{ code_server_rpms[_distro.value.el]['url'] | basename }}
    checksum: "sha256:{{ code_server_rpms[_distro.value.el]['sha256'] }}"
    owner: root
    group: root
    mode: '00644'
  loop: "{{ distros | dict2items }}"
  loop_control:
    loop_var: _distro
  notify: update repo metadata
