- name: install wallet-client package
  ansible.builtin.dnf:
    name: wallet-client-{{ wallet_client_version }}
    state: present
    update_cache: yes
    enablerepo: stanford

- name: install project manager script
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: /admin/bin/project_manager
    owner: root
    group: carina_admins
    mode: "0750"
  loop:
    - { src: 'files/project_manager/project_manager.py'}
    - { src: 'files/project_manager/requirements.txt'}
    
- name: install new user home quota script
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: "carina_admins"
    mode: "{{ item.mode }}"
  loop:
    - { src: set-home-quota.j2, dest: /admin/bin/set-home-quota, mode: "0750" }
    - { src: set-home-quota.env.j2, dest: /admin/bin/set-home-quota.env, mode: "0600" }

- name: run role c2-ansible
  ansible.builtin.include_role:
    name: c2-ansible
    apply:
      tags:
        - ansible
  tags:
    - always
