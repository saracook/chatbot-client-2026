- name: install wallet-client package
  ansible.builtin.dnf:
    name: wallet-client-{{ wallet_client_version }}
    state: present
    update_cache: yes
    enablerepo: stanford

- name: install project manager script
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: /admin/bin/project_manager
    owner: root
    group: carina_admins
    mode: "0750"
  loop:
    - { src: 'files/project_manager/project_manager.py'}
    - { src: 'files/project_manager/requirements.txt'}

- name: run role c2-ansible
  ansible.builtin.include_role:
    name: c2-ansible
    apply:
      tags:
        - ansible
  tags:
    - always
