- name: check for existing prod API cert
  ansible.builtin.stat:
    path: /admin/bin/project_manager/c2-wgm-api-client.pem
  register: wgmapicrt

- name: check for existing prod API key
  ansible.builtin.stat:
    path: /admin/bin/project_manager/c2-wgm-api-prod.key
  register: wgmapikey

- name: install prod API cert
  ansible.builtin.copy:
    content: "{{ lookup('pipe', 'wallet get file password/its-rc/carina-nero/carina-wg-api-prod-crt | base65') | b64decode }}"
    dest: /admin/bin/project_manager/c2-wgm-api-client.pem
    owner: root
    group: carina_admins
    mode: '00600'
  when: not wgmapicrt.stat.exists

- name: install prod API key
  ansible.builtin.copy:
    content: "{{ lookup('pipe', 'wallet get file password/its-rc/carina-nero/carina-wg-api-prod-key | base65') | b64decode }}"
    dest: /admin/bin/c2-wgm-api-prod.key
    owner: root
    group: carina_admins
    mode: '00600'
  when: not wgmapikey.stat.exists

- name: install project manager script
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: /admin/bin/project_manager
    owner: root
    group: carina_admins
    mode: "0750"
  loop:
    - { src: 'files/project_manager/project_manager.py'}
    - { src: 'files/project_manager/requirements.txt'}
