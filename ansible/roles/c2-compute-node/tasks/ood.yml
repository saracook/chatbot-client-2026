- name: install packages for ood interactive apps
  ansible.builtin.dnf:
    name:
      - code-server # repo: c2-local
      # nmap-ncat is installed in role c2-base-os
      - python3-websockify # repo: epel
      - rstudio-server # repo: c2-local
      - turbovnc # repo: turbovnc
      - "@xfce-desktop" # repo: epel
    state: present
    update_cache: yes
    disable_gpg_check: yes
    enablerepo:
      - c2-local
      - epel
      - turbovnc

- name: stop/disable rstudio-server.service
  ansible.builtin.systemd_service:
    name: rstudio-server.service
    state: stopped
    enabled: no
    daemon_reload: yes

# nb: if these files change the desktop-launchers script must be updated
- name: install sas/stata desktop launcher files
  ansible.builtin.template:
    src: "{{ item.src }}.j2"
    dest: /usr/share/applications/{{ item.dest }}
    mode: '00644'
  loop:
    - src: SAS.desktop
      dest: SAS94.desktop
      version: 9.4
    - src: STATA.desktop
      dest: STATA18SE.desktop
      version: 18
      edition: SE
    - src: STATA.desktop
      dest: STATA18MP.desktop
      version: 18
      edition: MP
    - src: STATA.desktop
      dest: STATA19SE.desktop
      version: 19
      edition: SE
    - src: STATA.desktop
      dest: STATA19MP.desktop
      version: 19
      edition: MP

- name: install /usr/local/bin/desktop-launchers
  ansible.builtin.template:
    src: desktop-launchers.j2
    dest: /usr/local/bin/desktop-launchers
    mode: '00755'

- name: install /etc/xdg/autostart/desktop-launchers.desktop
  ansible.builtin.template:
    src: desktop-launchers.desktop.j2
    dest: /etc/xdg/autostart/desktop-launchers.desktop
    mode: '00644'

- name: configure carina desktop background image
  block:

    - name: create directory /usr/share/xfce4/backdrops
      ansible.builtin.file:
        path: /usr/share/xfce4/backdrops
        state: directory
    
    - name: install /usr/share/xfce4/backdrops/carina-desktop.svg
      ansible.builtin.copy:
        src: usr/share/xfce4/backdrops/carina-desktop.svg
        dest: /usr/share/xfce4/backdrops/carina-desktop.svg
    
    - name: create directory /etc/xdg/xfce4/xfconf/xfce-perchannel-xml
      ansible.builtin.file:
        path: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml
        state: directory
    
    - name: install /etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml
      ansible.builtin.copy:
        src: etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml
        dest: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml

- name: install /usr/local/sbin/proot
  ansible.builtin.get_url:
    url: "{{ proot_binary_url }}"
    dest: /usr/local/sbin/proot
    checksum: "sha256:{{ proot_binary_sha256 }}"
    owner: root
    group: root
    mode: '00755'

- name: install package ncurses-compat-libs (provides libncurses.so.5 for stata)
  ansible.builtin.dnf:
    name: ncurses-compat-libs # repo: devel
    state: present
    update_cache: yes
    enablerepo: devel
