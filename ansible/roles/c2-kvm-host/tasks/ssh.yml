# this enables ssh public key authentication between
# kvm hosts for libvirt live migrations.

- name: create directory /root/.ssh
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    mode: '00700'

- name: install /root/.ssh/id_rsa
  ansible.builtin.copy:
    content: |
      {{ root_infra_ssh_private_key }}
    dest: /root/.ssh/id_rsa
    mode: '00600'

- name: install /root/.ssh/id_rsa.pub
  ansible.builtin.copy:
    content: |
      {{ root_infra_ssh_public_key }}
    dest: /root/.ssh/id_rsa.pub
    mode: '00644'

- name: install /root/.ssh/id_rsa.pub into /root/.ssh/authorized_keys
  ansible.posix.authorized_key:
    user: root
    key: "{{ root_infra_ssh_public_key }}"

- name: install /root/.ssh/config
  ansible.builtin.copy:
    content: |
      Host *
          HashKnownHosts no
          UserKnownHostsFile /dev/null
          StrictHostKeyChecking no
          LogLevel ERROR
    dest: /root/.ssh/config
    mode: '00644'
