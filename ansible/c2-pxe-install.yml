# assumptions:
# - bios boot order configured as pxe -> hdd
# - kickstart file specifies poweroff not reboot

- import_playbook: c2-check-env.yml

- name: check for pxe_clients extra variable
  hosts: localhost
  gather_facts: no
  tasks:
    - name: "{{ msg }}"
      fail:
        msg: "{{ msg }}"
      vars:
        msg: extra variable pxe_clients is not defined, is null/empty, or is not a subset of host group c2_pxe_client
      when: pxe_clients is not defined or pxe_clients is none or pxe_clients | length == 0 or pxe_clients is not subset(groups['c2_pxe_client'])
    - debug:
        var: pxe_clients

- name: configure pxe clients {{ pxe_clients }} to net boot
  hosts: c2_pxe_server
  become: yes
  gather_facts: no
  tasks:
    - name: configure pxe clients {{ pxe_clients }} to net boot
      ansible.builtin.include_role:
        name: c2-pxe-config
      vars:
        pxe_clients: "{{ pxe_clients }}"
        pxe_mode: netinstall

- name: power cycle pxe clients {{ pxe_clients }} and set to pxe boot for auto-install
  hosts: "{{ pxe_clients }}"
  connection: local
  gather_facts: no
  tasks:
    - name: power off pxe clients {{ pxe_clients }} for auto-install
      ansible.builtin.shell:
        cmd: |
          sshpass \
          -p "$IDRAC_PASSWORD" \
          ssh \
          -l "$IDRAC_USERNAME" \
          {{ idrac_ip }} \
          racadm serveraction powerdown
      environment:
        IDRAC_PASSWORD: "{{ idrac_password }}"
        IDRAC_USERNAME: "{{ idrac_username }}"
    - name: wait until pxe clients {{ pxe_clients }} are powered off for auto-install
      ansible.builtin.shell:
        cmd: |
          sshpass \
          -p "$IDRAC_PASSWORD" \
          ssh \
          -l "$IDRAC_USERNAME" \
          {{ idrac_ip }} \
          racadm getsysinfo -s | grep 'Power Status' | awk '{print $NF}'
      environment:
        IDRAC_PASSWORD: "{{ idrac_password }}"
        IDRAC_USERNAME: "{{ idrac_username }}"
      register: pwrstat
      until: pwrstat.stdout == 'OFF'
      # retry for 3 minutes
      retries: 18
      delay: 10
    - name: set pxe clients {{ pxe_clients }} to pxe boot for auto-install
      ansible.builtin.shell:
        cmd: |
          cat <<EOF | sshpass -p "$IDRAC_PASSWORD" ssh -l "$IDRAC_USERNAME" {{ idrac_ip }}
          racadm set iDRAC.ServerBoot.BootOnce Enabled
          racadm set iDRAC.ServerBoot.FirstBootDevice PXE
          EOF
      environment:
        IDRAC_PASSWORD: "{{ idrac_password }}"
        IDRAC_USERNAME: "{{ idrac_username }}"
    - name: power on pxe clients {{ pxe_clients }} for auto-install
      ansible.builtin.shell:
        cmd: |
          sshpass \
          -p "$IDRAC_PASSWORD" \
          ssh \
          -l "$IDRAC_USERNAME" \
          {{ idrac_ip }} \
          racadm serveraction powerup
      environment:
        IDRAC_PASSWORD: "{{ idrac_password }}"
        IDRAC_USERNAME: "{{ idrac_username }}"
    - name: wait until pxe clients {{ pxe_clients }} are powered on for auto-install
      ansible.builtin.shell:
        cmd: |
          sshpass \
          -p "$IDRAC_PASSWORD" \
          ssh \
          -l "$IDRAC_USERNAME" \
          {{ idrac_ip }} \
          racadm getsysinfo -s | grep 'Power Status' | awk '{print $NF}'
      environment:
        IDRAC_PASSWORD: "{{ idrac_password }}"
        IDRAC_USERNAME: "{{ idrac_username }}"
      register: pwrstat
      until: pwrstat.stdout == 'ON'
      # retry for 3 minutes
      retries: 18
      delay: 10
    - name: wait until pxe clients {{ pxe_clients }} are powered off after auto-install
      ansible.builtin.shell:
        cmd: |
          sshpass \
          -p "$IDRAC_PASSWORD" \
          ssh \
          -l "$IDRAC_USERNAME" \
          {{ idrac_ip }} \
          racadm getsysinfo -s | grep 'Power Status' | awk '{print $NF}'
      environment:
        IDRAC_PASSWORD: "{{ idrac_password }}"
        IDRAC_USERNAME: "{{ idrac_username }}"
      register: pwrstat
      until: pwrstat.stdout == 'OFF'
      # retry for 10 minutes
      retries: 60
      delay: 10

- name: configure pxe clients {{ pxe_clients }} to local boot
  hosts: c2_pxe_server
  become: yes
  gather_facts: no
  tasks:
    - name: configure pxe clients {{ pxe_clients }} to local boot
      ansible.builtin.include_role:
        name: c2-pxe-config
      vars:
        pxe_clients: "{{ pxe_clients }}"

- name: power on pxe clients {{ pxe_clients }} and wait for ssh
  hosts: "{{ pxe_clients }}"
  connection: local
  gather_facts: no
  tasks:
    - name: power on pxe clients {{ pxe_clients }} after auto-install
      ansible.builtin.shell:
        cmd: |
          sshpass \
          -p "$IDRAC_PASSWORD" \
          ssh \
          -l "$IDRAC_USERNAME" \
          {{ idrac_ip }} \
          racadm serveraction powerup
      environment:
        IDRAC_PASSWORD: "{{ idrac_password }}"
        IDRAC_USERNAME: "{{ idrac_username }}"
    - name: wait until pxe clients {{ pxe_clients }} are powered on after auto-install
      ansible.builtin.shell:
        cmd: |
          sshpass \
          -p "$IDRAC_PASSWORD" \
          ssh \
          -l "$IDRAC_USERNAME" \
          {{ idrac_ip }} \
          racadm getsysinfo -s | grep 'Power Status' | awk '{print $NF}'
      environment:
        IDRAC_PASSWORD: "{{ idrac_password }}"
        IDRAC_USERNAME: "{{ idrac_username }}"
      register: pwrstat
      until: pwrstat.stdout == 'ON'
      # retry for 3 minutes
      retries: 18
      delay: 10
    - name: wait for ssh to be available on pxe clients {{ pxe_clients }}
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        # retry for 10 minutes
        delay: 60
        timeout: 600

- name: ping pxe clients {{ pxe_clients }}
  hosts: "{{ pxe_clients }}"
  gather_facts: no
  tasks:
    - name: ping pxe client {{ inventory_hostname }}
      ansible.builtin.ping:
