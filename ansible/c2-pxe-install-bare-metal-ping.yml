- name: power on pxe clients
  ansible.builtin.shell:
    cmd: |
      sshpass \
      -p "$IDRAC_PASSWORD" \
      ssh \
      -l "$IDRAC_USERNAME" \
      {{ idrac_ip }} \
      racadm serveraction powerup
  environment:
    IDRAC_PASSWORD: "{{ idrac_password }}"
    IDRAC_USERNAME: "{{ idrac_username }}"

- name: wait until pxe clients are powered on
  ansible.builtin.shell:
    cmd: |
      sshpass \
      -p "$IDRAC_PASSWORD" \
      ssh \
      -l "$IDRAC_USERNAME" \
      {{ idrac_ip }} \
      racadm getsysinfo -s | grep 'Power Status' | awk '{print $NF}'
  environment:
    IDRAC_PASSWORD: "{{ idrac_password }}"
    IDRAC_USERNAME: "{{ idrac_username }}"
  register: pwrstat
  until: pwrstat.stdout == 'ON'
  # retry for 3 minutes
  retries: 18
  delay: 10

- name: wait for ssh to be available
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    # retry for 10 minutes
    delay: 60
    timeout: 600
