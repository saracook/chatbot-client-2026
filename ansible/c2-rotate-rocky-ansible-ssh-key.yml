- name: rotate rocky ansible ssh key
  hosts: all
  become: yes
  gather_facts: no
  vars:
    # these must be present in playbook_dir
    old_priv_key: rocky-old.pem
    old_pub_key: rocky-old.pub
    new_priv_key: rocky-new.pem
    new_pub_key: rocky-new.pub
  tasks:
  
    - name: install new rocky ansible ssh key
      ansible.posix.authorized_key:
        user: "{{ item }}"
        state: present
        key: "{{ lookup('file', playbook_dir ~ '/' ~ new_pub_key) }}"
      vars:
        ansible_ssh_private_key_file: "{{ playbook_dir ~ '/' ~ old_priv_key }}"
      loop: [root, rocky]

    - name: remove old rocky ansible ssh key
      ansible.posix.authorized_key:
        user: "{{ item }}"
        state: absent
        key: "{{ lookup('file', playbook_dir ~ '/' ~ old_pub_key) }}"
      vars:
        ansible_ssh_private_key_file: "{{ playbook_dir ~ '/' ~ new_priv_key }}"
      loop: [root, rocky]
